<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Dark navy background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <!-- Cyan-to-violet border gradient -->
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Cyan-to-white letter gradient -->
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3f0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle top-left highlight -->
  <ellipse cx="6" cy="6" rx="12" ry="10" fill="#22d3ee" opacity="0.07" clip-path="url(#clip)"/>

  <!-- Gradient border ring -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.4"
        fill="none" stroke="url(#border)" stroke-width="1.5" opacity="0.7"/>

  <!-- The "G" — drawn as a path for crisp rendering at any size -->
  <!-- Center: 16,16 | Cap-height ~18px, baseline ~22px -->
  <text
    x="16" y="22"
    font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"
    font-size="19"
    font-weight="800"
    text-anchor="middle"
    fill="url(#letter)"
    letter-spacing="-0.5"
  >G</text>
</svg>
